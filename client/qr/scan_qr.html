<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR Presensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{margin-bottom:10px;}

#reader{
width:100%;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.status{
margin-top:15px;
font-weight:bold;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:280px;
}

.popup-box button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#667eea;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Scan QR Presensi</h2>
<p>Arahkan kamera ke QR</p>

<input type="text" id="userId" placeholder="Masukkan NIM">

<div id="reader"></div>

<div class="status" id="statusText">Menunggu scan...</div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<h3 id="popupTitle"></h3>
<p id="popupMsg"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec";

let scanner;
let deviceId = getDeviceId();

function getDeviceId(){
let id = localStorage.getItem("device_id");
if(!id){
id = "HP-" + Math.floor(Math.random()*100000);
localStorage.setItem("device_id",id);
}
return id;
}

function showPopup(title,msg){
document.getElementById("popupTitle").innerText=title;
document.getElementById("popupMsg").innerText=msg;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function startScanner(){
scanner = new Html5Qrcode("reader");
scanner.start(
{ facingMode: "environment" },
{ fps: 10, qrbox: 250 },
onScanSuccess
);
}

async function onScanSuccess(decodedText){

const userId = document.getElementById("userId").value;

if(!userId){
showPopup("Error","Masukkan NIM terlebih dahulu");
return;
}

document.getElementById("statusText").innerText="Mengirim presensi...";

navigator.geolocation.getCurrentPosition(async (pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const params = new URLSearchParams();
params.append("qr_token",decodedText);
params.append("user_id",userId);
params.append("device_id",deviceId);
params.append("lat",lat);
params.append("lng",lng);

try{

const res = await fetch(BASE_URL+"?path=presence/checkin",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:params
});

const data = await res.json();

if(data.ok){
showPopup("Berhasil","Presensi berhasil direkam");
scanner.stop();
}
else{
showPopup("Gagal",data.error);
}

}catch(e){
showPopup("Error","Tidak bisa koneksi ke server");
}

});

}

startScanner();

</script>

</body>
</html>
