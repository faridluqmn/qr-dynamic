<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR Presensi</title>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{margin-bottom:15px;}

#reader{
width:100%;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#4facfe;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{background:#00c6ff;}

.status{
margin-top:15px;
font-weight:bold;
}

.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="container">
<h2>Scan QR Presensi</h2>

<input type="text" id="userId" placeholder="Masukkan NIM">
<input type="text" id="deviceId" placeholder="Device ID (contoh: HP-01)">
<input type="text" id="baseUrl" value="https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec">

<div id="reader"></div>

<div class="status" id="statusText">Menunggu scan QR...</div>
</div>

<script>

let scanned = false;

function onScanSuccess(decodedText) {
if(scanned) return;
scanned = true;

document.getElementById("statusText").innerText="QR terdeteksi, mengambil lokasi...";
checkin(decodedText);
}

const html5QrcodeScanner = new Html5QrcodeScanner(
"reader", { fps: 10, qrbox: 250 });

html5QrcodeScanner.render(onScanSuccess);

function checkin(token){

const userId=document.getElementById("userId").value;
const deviceId=document.getElementById("deviceId").value;
const baseUrl=document.getElementById("baseUrl").value;

if(!userId || !deviceId){
document.getElementById("statusText").innerText="Isi NIM dan Device ID dulu!";
return;
}

navigator.geolocation.getCurrentPosition(async (pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const params = new URLSearchParams();
params.append("qr_token",token);
params.append("user_id",userId);
params.append("device_id",deviceId);
params.append("lat",lat);
params.append("lng",lng);

try{
const res = await fetch(baseUrl+"?path=presence/checkin",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:params
});

const data = await res.json();

if(data.ok){
document.getElementById("statusText").innerText="Presensi berhasil!";
document.getElementById("statusText").className="status success";
}
else{
document.getElementById("statusText").innerText=data.error;
document.getElementById("statusText").className="status error";
}

}catch(e){
document.getElementById("statusText").innerText="Gagal koneksi ke server";
document.getElementById("statusText").className="status error";
}

});

}

</script>

</body>
</html>
