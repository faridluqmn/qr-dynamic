<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Presensi - CyberCampus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 20px;
            padding: 20px 30px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 14px;
            color: gray;
        }

        .table-container {
            background: white;
            margin: 20px 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 14px;
            text-align: left;
            font-size: 13px;
            color: gray;
        }

        td {
            padding: 14px;
            border-top: 1px solid #f1f5f9;
            font-size: 14px;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            background: #dcfce7;
            color: #16a34a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn {
            padding: 6px 12px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2563eb;
        }

        .footer {
            padding: 10px 30px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">Monitoring Presensi</div>
    <button class="btn" onclick="refreshData()">Refresh</button>
</div>

<div class="stats">
    <div class="stat-box">
        <div class="stat-number" id="total">0</div>
        <div class="stat-label">Total Presensi</div>
    </div>

    <div class="stat-box">
        <div class="stat-number" id="hadir">0</div>
        <div class="stat-label">Hadir</div>
    </div>

    <div class="stat-box">
        <div class="stat-number" id="sesi">-</div>
        <div class="stat-label">Session</div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>User ID</th>
                <th>Course</th>
                <th>Session</th>
                <th>Device</th>
                <th>Waktu</th>
                <th>Status</th>
                <th>Lokasi</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<div class="footer">
    Last update: <span id="lastUpdate">-</span>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec";

async function loadPresence(){
    const res = await fetch(`${BASE_URL}?path=presence/list`);
    const result = await res.json();

    if(!result.ok) return;

    const data = result.data;
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    document.getElementById("total").innerText = data.length;
    document.getElementById("hadir").innerText = data.length;

    if(data.length > 0){
        document.getElementById("sesi").innerText = data[0].session_id;
    }

    data.forEach(row => {

        const time = new Date(row.ts).toLocaleTimeString("id-ID");

        const tr = `
        <tr>
            <td>${row.user_id}</td>
            <td>${row.course_id}</td>
            <td>${row.session_id}</td>
            <td>${row.device_id}</td>
            <td>${time}</td>
            <td><span class="badge">Hadir</span></td>
            <td><button class="btn" onclick="openMap()">Lihat</button></td>
        </tr>
        `;

        tbody.innerHTML += tr;
    });

    document.getElementById("lastUpdate").innerText =
        new Date().toLocaleString("id-ID");
}

function openMap(){
    window.open("monitoring-maps.html");
}

function refreshData(){
    loadPresence();
}

setInterval(loadPresence, 5000);
loadPresence();
</script>

</body>
</html>
