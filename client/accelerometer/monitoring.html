<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Telemetry Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#2a5298;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

th,td{
padding:12px;
text-align:center;
}

th{
background:#eef2ff;
}

tr:nth-child(even){
background:#f8f9ff;
}

.active{ color:green; font-weight:bold; }
.idle{ color:orange; font-weight:bold; }
.offline{ color:red; font-weight:bold; }

.deviceCharts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.chartBox{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>
<h2>Device Telemetry Monitoring</h2>
</header>

<div class="container">

<table id="deviceTable">
<thead>
<tr>
<th>Device ID</th>
<th>AX</th>
<th>AY</th>
<th>AZ</th>
<th>Last Update</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="deviceCharts" id="chartsContainer"></div>

</div>

<script>

const API_LATEST="https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec?path=telemetry/latest";
const API_HISTORY="https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec?path=telemetry/history";

let charts={};

async function loadDashboard(){

try{

/* ===== LOAD TABLE ===== */
const resLatest=await fetch(API_LATEST);
const latest=await resLatest.json();

if(latest.ok){

const tbody=document.querySelector("#deviceTable tbody");
tbody.innerHTML="";

latest.devices.forEach(device=>{

const diff=Date.now()-device.ts;

let status="OFFLINE";
let statusClass="offline";

if(diff<10000){
status="ACTIVE";
statusClass="active";
}
else if(diff<60000){
status="IDLE";
statusClass="idle";
}

const row=`
<tr>
<td>${device.device_id}</td>
<td>${device.ax.toFixed(2)}</td>
<td>${device.ay.toFixed(2)}</td>
<td>${device.az.toFixed(2)}</td>
<td>${new Date(device.ts).toLocaleTimeString()}</td>
<td class="${statusClass}">${status}</td>
</tr>
`;

tbody.innerHTML+=row;

});

}

/* ===== LOAD CHART HISTORY ===== */
const resHistory=await fetch(API_HISTORY);
const history=await resHistory.json();

if(history.ok){

for(const deviceId in history.devices){

updateChart(deviceId, history.devices[deviceId]);

}

}

}catch(e){
console.log(e);
}

}

function updateChart(deviceId, readings){

const id="chart-"+deviceId;
const container=document.getElementById("chartsContainer");

if(!charts[id]){

const box=document.createElement("div");
box.className="chartBox";
box.innerHTML=`<h4>${deviceId}</h4><canvas id="${id}"></canvas>`;
container.appendChild(box);

const ctx=document.getElementById(id);

charts[id]=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"AX", borderColor:"red", data:[], fill:false},
{label:"AY", borderColor:"green", data:[], fill:false},
{label:"AZ", borderColor:"blue", data:[], fill:false}
]
},
options:{
animation:false,
responsive:true,
scales:{y:{suggestedMin:-20,suggestedMax:20}}
}
});

}

const chart=charts[id];

chart.data.labels=[];
chart.data.datasets[0].data=[];
chart.data.datasets[1].data=[];
chart.data.datasets[2].data=[];

readings.slice(-20).forEach(r=>{
chart.data.labels.push("");
chart.data.datasets[0].data.push(r.ax);
chart.data.datasets[1].data.push(r.ay);
chart.data.datasets[2].data.push(r.az);
});

chart.update();

}

loadDashboard();
setInterval(loadDashboard,3000);

</script>

</body>
</html>
