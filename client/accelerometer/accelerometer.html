<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<!-- penting supaya tidak kecil di HP -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accelerometer Telemetry Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* container */

.container{
background:white;
width:100%;
max-width:600px;
padding:25px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* title */

h2{
text-align:center;
margin-bottom:20px;
color:#2a5298;
}

/* input */

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:15px;
}

/* buttons */

.buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

.start{
background:#2ecc71;
color:white;
}

.start:hover{
background:#27ae60;
}

.stop{
background:#e74c3c;
color:white;
}

.stop:hover{
background:#c0392b;
}

/* sensor grid */

.sensor-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.sensor-box{
background:#f2f5fa;
padding:16px;
border-radius:10px;
text-align:center;
}

.label{
font-size:13px;
color:#777;
}

.value{
font-size:22px;
font-weight:bold;
color:#2a5298;
margin-top:5px;
}

/* 3D phone */

.phone-wrapper{
display:flex;
justify-content:center;
margin-bottom:25px;
perspective:800px;
}

.phone3d{
width:80px;
height:160px;
background:#111;
border-radius:16px;
border:3px solid #444;
transform-style:preserve-3d;
transition:transform 0.05s linear;
position:relative;
}

.phone3d::before{
content:"";
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
width:30px;
height:4px;
background:#666;
border-radius:2px;
}

.screen{
width:100%;
height:100%;
background:#e9eef7;
border-radius:12px;
}

/* chart */

.chart-container{
height:250px;
}

/* status */

#status{
margin-top:15px;
padding:10px;
border-radius:8px;
background:#eef3ff;
text-align:center;
font-size:14px;
}

/* mobile */

@media(max-width:480px){

.container{
padding:20px;
}

.value{
font-size:20px;
}

.phone3d{
width:70px;
height:140px;
}

.chart-container{
height:220px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Accelerometer Telemetry</h2>

<input id="device_id" placeholder="Masukkan Device ID (contoh: HP-01)">

<div class="buttons">
<button class="start" onclick="startSensor()">Start</button>
<button class="stop" onclick="stopSensor()">Stop</button>
</div>

<div class="sensor-grid">

<div class="sensor-box">
<div class="label">AX</div>
<div class="value" id="ax">0</div>
</div>

<div class="sensor-box">
<div class="label">AY</div>
<div class="value" id="ay">0</div>
</div>

<div class="sensor-box">
<div class="label">AZ</div>
<div class="value" id="az">0</div>
</div>

</div>

<div class="phone-wrapper">
<div class="phone3d" id="phone3d">
<div class="screen"></div>
</div>
</div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

<div id="status">Menunggu sensor...</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec?path=telemetry/batch";

let batch=[];
let sensorActive=false;

/* chart */

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[
{
label:"AX",
borderColor:"#e74c3c",
data:[],
fill:false,
tension:0.3
},
{
label:"AY",
borderColor:"#2ecc71",
data:[],
fill:false,
tension:0.3
},
{
label:"AZ",
borderColor:"#3498db",
data:[],
fill:false,
tension:0.3
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:false,
scales:{
y:{
suggestedMin:-20,
suggestedMax:20
}
}
}
});

/* start sensor */

function startSensor(){

const DEVICE_ID=document.getElementById("device_id").value.trim();

if(!DEVICE_ID){
alert("Isi Device ID terlebih dahulu");
return;
}

if(sensorActive) return;

if(typeof DeviceMotionEvent.requestPermission==="function"){

DeviceMotionEvent.requestPermission()
.then(permissionState=>{
if(permissionState==="granted"){
window.addEventListener("devicemotion",handleMotion);
window.addEventListener("deviceorientation",handleOrientation);
sensorActive=true;
}
});

}else{

window.addEventListener("devicemotion",handleMotion);
window.addEventListener("deviceorientation",handleOrientation);
sensorActive=true;

}

document.getElementById("status").innerText="Sensor aktif...";

}

/* stop sensor */

function stopSensor(){

window.removeEventListener("devicemotion",handleMotion);
window.removeEventListener("deviceorientation",handleOrientation);

sensorActive=false;

document.getElementById("status").innerText="Sensor dihentikan";

}

/* motion */

function handleMotion(event){

let ax=event.accelerationIncludingGravity.x||0;
let ay=event.accelerationIncludingGravity.y||0;
let az=event.accelerationIncludingGravity.z||0;

document.getElementById("ax").innerText=ax.toFixed(2);
document.getElementById("ay").innerText=ay.toFixed(2);
document.getElementById("az").innerText=az.toFixed(2);

updateChart(ax,ay,az);

let data={
ax:ax,
ay:ay,
az:az,
ts:Date.now()
};

batch.push(data);

if(batch.length>=10){
sendBatch();
}

}

/* orientation */

function handleOrientation(event){

let beta=event.beta||0;
let gamma=event.gamma||0;

document.getElementById("phone3d").style.transform=
`rotateX(${beta}deg) rotateY(${gamma}deg)`;

}

/* chart update */

function updateChart(ax,ay,az){

const t=new Date().toLocaleTimeString();

chart.data.labels.push(t);
chart.data.datasets[0].data.push(ax);
chart.data.datasets[1].data.push(ay);
chart.data.datasets[2].data.push(az);

if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets.forEach(d=>d.data.shift());
}

chart.update();

}

/* send telemetry */

function sendBatch(){

const DEVICE_ID=document.getElementById("device_id").value.trim();

let payload={
device_id:DEVICE_ID,
readings:batch
};

fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
})
.then(()=>{

document.getElementById("status").innerText=
"Batch terkirim: "+batch.length+" data";

batch=[];

})
.catch(()=>{
document.getElementById("status").innerText="Gagal kirim data";
});

}

</script>

</body>
</html>
