<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Lokasi Mahasiswa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
        }

        #sidebar {
            width: 260px;
            background: #0f172a;
            color: white;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #studentList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #studentList li {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #map {
            flex: 1;
            height: 100vh;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .online { background: #22c55e; }
        .idle { background: #f59e0b; }
        .offline { background: #ef4444; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Monitoring Mahasiswa</h3>
    <div>Total Online: <b id="total">0</b></div>
    <ul id="studentList"></ul>
</div>

<div id="map"></div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec";

let map = L.map('map').setView([-6.9175, 107.6191], 15);
let markerGroup = L.featureGroup().addTo(map);
let lastPositions = {};
let paths = {};

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Radius kelas
L.circle([-6.9175, 107.6191], {
    radius: 50,
    color: 'blue',
    fillOpacity: 0.1
}).addTo(map);

// Icon marker
function getIcon(status) {
    let url = "";

    if (status === "online")
        url = "https://cdn-icons-png.flaticon.com/512/149/149059.png";
    else if (status === "idle")
        url = "https://cdn-icons-png.flaticon.com/512/854/854878.png";
    else
        url = "https://cdn-icons-png.flaticon.com/512/1828/1828843.png";

    return L.icon({
        iconUrl: url,
        iconSize: [35, 35],
        iconAnchor: [17, 35]
    });
}

async function loadLocations() {
    const res = await fetch(`${BASE_URL}?path=maps/get`);
    const result = await res.json();
    if (!result.ok) return;

    markerGroup.clearLayers();

    const list = document.getElementById("studentList");
    list.innerHTML = "";

    let onlineCount = 0;
    const now = Date.now();

    result.data.forEach(user => {

        const diff = (now - user.ts) / 1000;
        let status = "offline";

        if (diff < 10) {
            status = "online";
            onlineCount++;
        } else if (diff < 30) {
            status = "idle";
        } else {
            status = "offline";
        }

        // SIMPAN JEJAK
        if (!paths[user.user_id]) {
            paths[user.user_id] = [];
        }
        paths[user.user_id].push([user.lat, user.lng]);

        L.polyline(paths[user.user_id], { color: 'blue' }).addTo(map);

        const marker = L.marker([user.lat, user.lng], { icon: getIcon(status) })
            .bindPopup(`
                <b>NIM:</b> ${user.user_id}<br>
                <b>Status:</b> ${status}<br>
                <b>Update:</b> ${new Date(user.ts).toLocaleTimeString()}
            `);

        markerGroup.addLayer(marker);

        // Sidebar
        const li = document.createElement("li");
        li.innerHTML = `<span class="dot ${status}"></span> ${user.user_id}`;
        list.appendChild(li);
    });

    document.getElementById("total").innerText = onlineCount;

    if (markerGroup.getLayers().length > 0) {
        map.fitBounds(markerGroup.getBounds(), { padding: [50, 50] });
    }
}

// Refresh tiap 3 detik
setInterval(loadLocations, 3000);
loadLocations();
</script>

</body>
</html>
