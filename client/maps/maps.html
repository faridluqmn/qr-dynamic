<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Lokasi Mahasiswa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
        }

        #sidebar {
            width: 260px;
            background: #0f172a;
            color: white;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #sidebar h3 {
            margin-top: 0;
            font-size: 18px;
        }

        #studentList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #studentList li {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #map {
            flex: 1;
            height: 100vh;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .online { background: #10b981; }
        .moving { background: #ef4444; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Monitoring Mahasiswa</h3>
    <div>Total Online: <b id="total">0</b></div>
    <ul id="studentList"></ul>
</div>

<div id="map"></div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec";

let map = L.map('map').setView([-6.9175, 107.6191], 15);
let markerGroup = L.featureGroup().addTo(map);
let lastPositions = {};
let paths = {};

// TILE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
}).addTo(map);

// RADIUS KELAS (ubah sesuai lokasi kampus/kelas)
const classLatLng = [-6.9175, 107.6191];

L.circle(classLatLng, {
    radius: 50,
    color: 'blue',
    fillColor: '#3b82f6',
    fillOpacity: 0.2
}).addTo(map);

// ICON
function getIcon(color) {
    return L.icon({
        iconUrl: color === "red"
            ? "https://cdn-icons-png.flaticon.com/512/684/684908.png"
            : "https://cdn-icons-png.flaticon.com/512/149/149059.png",
        iconSize: [35, 35],
        iconAnchor: [17, 35]
    });
}

async function loadLocations() {
    const res = await fetch(`${BASE_URL}?path=maps/get`);
    const result = await res.json();

    if (!result.ok) return;

    markerGroup.clearLayers();
    document.getElementById("total").innerText = result.data.length;

    const list = document.getElementById("studentList");
    list.innerHTML = "";

    result.data.forEach(user => {

        let color = "green";

        if (lastPositions[user.user_id]) {
            const last = lastPositions[user.user_id];

            if (last.lat != user.lat || last.lng != user.lng) {
                color = "red"; // bergerak
            }
        }

        lastPositions[user.user_id] = { lat: user.lat, lng: user.lng };

        // SIMPAN JEJAK
        if (!paths[user.user_id]) {
            paths[user.user_id] = [];
        }
        paths[user.user_id].push([user.lat, user.lng]);

        // GARIS JEJAK
        L.polyline(paths[user.user_id], { color: 'blue' }).addTo(map);

        const marker = L.marker([user.lat, user.lng], { icon: getIcon(color) })
            .bindPopup(`
                <b>NIM:</b> ${user.user_id} <br>
                <b>Lat:</b> ${user.lat} <br>
                <b>Lng:</b> ${user.lng} <br>
                <b>Update:</b> ${new Date(user.ts).toLocaleTimeString()}
            `);

        markerGroup.addLayer(marker);

        // SIDEBAR LIST
        const li = document.createElement("li");
        li.innerHTML = `
            <span class="status-dot ${color === 'red' ? 'moving' : 'online'}"></span>
            ${user.user_id}
        `;
        list.appendChild(li);
    });

    if (result.data.length > 0) {
        map.fitBounds(markerGroup.getBounds(), { padding: [50, 50] });
    }
}

// REFRESH 3 DETIK
setInterval(loadLocations, 3000);
loadLocations();
</script>

</body>
</html>
